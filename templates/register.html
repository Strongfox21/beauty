<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Регистрация - BeautyShop</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body class="auth-page">
    <div class="auth-container">
        <div class="auth-box">
            <div class="auth-header">
                <h1>✨ BeautyShop</h1>
                <h2>Регистрация</h2>
            </div>
            
            <div class="form-group">
                <label>Имя *</label>
                <input type="text" id="name" placeholder="Ваше имя" required>
            </div>
            
            <div class="form-group">
                <label>Email *</label>
                <input type="email" id="email" placeholder="example@mail.kg" required>
            </div>
            
            <div class="form-group">
                <label>Телефон</label>
                <input type="tel" id="phone" placeholder="+996 555 123 456">
            </div>
            
            <div class="form-group">
                <label>Пароль *</label>
                <input type="password" id="password" placeholder="Минимум 6 символов" required>
            </div>
            
            <div id="errorMessage" class="error-message" style="display:none"></div>
            <div id="successMessage" class="success-message" style="display:none"></div>
            
            <button onclick="register()" class="btn btn-primary btn-block btn-large">Зарегистрироваться</button>
            
            <p class="auth-link">Уже есть аккаунт? <a href="/login">Войти</a></p>
            <p class="auth-link"><a href="/">← Вернуться на главную</a></p>
        </div>
    </div>

    <script src="/static/js/script.js"></script>
</body>
</html>
