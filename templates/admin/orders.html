<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Управление заказами - BeautyShop</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body class="admin-body">
    <aside class="admin-sidebar">
        <div class="admin-logo">
            <h2>✨ BeautyShop</h2>
            <p>Админ-панель</p>
        </div>
        <nav class="admin-nav">
            <a href="/admin">📊 Dashboard</a>
            <a href="/admin/products">📦 Товары</a>
            <a href="/admin/orders" class="active">🛒 Заказы</a>
            <a href="/admin/users">👥 Пользователи</a>
            <a href="/">🏠 На сайт</a>
            <a href="/logout">🚪 Выход</a>
        </nav>
    </aside>

    <main class="admin-main">
        <h1>Управление заказами</h1>
        
        <table class="admin-table" id="ordersTable">
            <thead>
                <tr>
                    <th>№</th>
                    <th>Дата</th>
                    <th>Сумма (сом)</th>
                    <th>Телефон</th>
                    <th>Адрес</th>
                    <th>Статус</th>
                    <th>Действия</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </main>

    <div id="orderModal" class="modal" style="display:none">
        <div class="modal-content modal-large">
            <h2>Детали заказа #<span id="orderNumber"></span></h2>
            <div id="orderDetails"></div>
            <button onclick="closeOrderModal()" class="btn btn-secondary">Закрыть</button>
        </div>
    </div>

    <script src="/static/js/script.js"></script>
    <script>loadAdminOrders();</script>
</body>
</html>
