<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Каталог - BeautyShop</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <header class="header">
        <div class="container">
            <div class="header-content">
                <div class="logo">
                    <h1>✨ BeautyShop</h1>
                </div>
                <nav class="nav">
                    <a href="/">Главная</a>
                    <a href="/catalog">Каталог</a>
                    <a href="/cart">🛒 Корзина (<span id="cartCount">0</span>)</a>
                    <div id="userMenu"></div>
                </nav>
            </div>
        </div>
    </header>

    <div class="catalog-page">
        <div class="container">
            <div class="catalog-layout">
                <aside class="filters">
                    <h3>Фильтры</h3>
                    
                    <div class="filter-group">
                        <h4>Категория</h4>
                        <div id="categoryFilters"></div>
                    </div>
                    
                    <div class="filter-group">
                        <h4>Бренд</h4>
                        <div id="brandFilters"></div>
                    </div>
                    
                    <div class="filter-group">
                        <h4>Поиск</h4>
                        <input type="text" id="searchInput" placeholder="Название товара..." class="search-input">
                    </div>
                    
                    <button onclick="resetFilters()" class="btn btn-secondary btn-block">Сбросить фильтры</button>
                </aside>

                <main class="catalog-main">
                    <div class="catalog-header">
                        <h1>Каталог товаров</h1>
                        <div class="sort-wrapper">
                            <label>Сортировка:</label>
                            <select id="sortSelect" onchange="loadProducts()">
                                <option value="name">По названию</option>
                                <option value="price_asc">Цена: по возрастанию</option>
                                <option value="price_desc">Цена: по убыванию</option>
                                <option value="rating">По рейтингу</option>
                            </select>
                        </div>
                    </div>
                    <div id="productsGrid" class="product-grid"></div>
                    <div id="emptyResults" style="display:none" class="empty-results">
                        <div class="empty-icon">😔</div>
                        <h3>Товары не найдены</h3>
                        <p>Попробуйте изменить параметры поиска</p>
                    </div>
                </main>
            </div>
        </div>
    </div>

    <footer class="footer">
        <div class="container">
            <p>&copy; 2024 BeautyShop</p>
        </div>
    </footer>

    <script src="/static/js/script.js"></script>
    <script>
        checkAuth();
        loadCatalog();
        updateCartCount();
    </script>
</body>
</html>
