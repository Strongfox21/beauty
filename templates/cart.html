<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Корзина - BeautyShop</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <header class="header">
        <div class="container">
            <div class="header-content">
                <div class="logo">
                    <h1>✨ BeautyShop</h1>
                </div>
                <nav class="nav">
                    <a href="/">Главная</a>
                    <a href="/catalog">Каталог</a>
                    <a href="/cart">🛒 Корзина (<span id="cartCount">0</span>)</a>
                    <div id="userMenu"></div>
                </nav>
            </div>
        </div>
    </header>

    <div class="cart-page">
        <div class="container">
            <h1>Корзина покупок</h1>
            
            <div id="cartItems" class="cart-items"></div>
            
            <div id="emptyCart" class="empty-cart" style="display:none">
                <div class="empty-icon">🛒</div>
                <h2>Корзина пуста</h2>
                <p>Добавьте товары из каталога</p>
                <a href="/catalog" class="btn btn-primary">Перейти в каталог</a>
            </div>
            
            <div id="cartSummary" class="cart-summary" style="display:none">
                <div class="summary-info">
                    <h3>Итого: <span id="cartTotal">0</span> сом</h3>
                    <p class="delivery-info">Доставка: Бесплатно при заказе от 1500 сом</p>
                </div>
                <button onclick="showCheckoutForm()" class="btn btn-primary btn-large">Оформить заказ</button>
            </div>
            
            <div id="checkoutForm" class="checkout-form" style="display:none">
                <h3>Оформление заказа</h3>
                <div id="loginWarning" class="warning-message" style="display:none">
                    <p>⚠️ Для оформления заказа необходимо <a href="/login">войти в систему</a></p>
                </div>
                <div class="form-group">
                    <label>Телефон *</label>
                    <input type="tel" id="orderPhone" placeholder="+996 555 123 456" required>
                </div>
                <div class="form-group">
                    <label>Адрес доставки *</label>
                    <textarea id="orderAddress" placeholder="Город, улица, дом, квартира" required rows="3"></textarea>
                </div>
                <div class="form-actions">
                    <button onclick="submitOrder()" class="btn btn-primary">Подтвердить заказ</button>
                    <button onclick="hideCheckoutForm()" class="btn btn-secondary">Отмена</button>
                </div>
            </div>
        </div>
    </div>

    <footer class="footer">
        <div class="container">
            <p>&copy; 2024 BeautyShop</p>
        </div>
    </footer>

    <script src="/static/js/script.js"></script>
    <script>
        checkAuth();
        loadCart();
        updateCartCount();
    </script>
</body>
</html>
